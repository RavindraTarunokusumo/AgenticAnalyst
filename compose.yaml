name: analyst-engine

services:
  app:
    build:
      context: .
    environment:
      APP_PROCESS_MODE: ${APP_PROCESS_MODE:-api}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      DASHSCOPE_BASE_URL: ${DASHSCOPE_BASE_URL:-https://dashscope-intl.aliyuncs.com/compatible-mode/v1}
      DATABASE_URL: ${DATABASE_URL:-}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
      LANGSMITH_ENDPOINT: ${LANGSMITH_ENDPOINT:-}
      LANGSMITH_PROJECT: ${LANGSMITH_PROJECT:-analyst-engine-local}
      LANGSMITH_TRACING: ${LANGSMITH_TRACING:-false}
      SEARXNG_BASE_URL: http://searxng:8080
    depends_on:
      postgres:
        condition: service_healthy
      searxng:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/analyst-engine-ready"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  postgres:
    image: pgvector/pgvector:0.8.0-pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-analyst_engine}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_USER: ${POSTGRES_USER:-analyst_engine}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  searxng:
    image: searxng/searxng:2026.7.6-556d08c39
    environment:
      SEARXNG_BASE_URL: ${SEARXNG_PUBLIC_BASE_URL:-http://localhost:8080/}
      SEARXNG_SECRET: ${SEARXNG_SECRET_KEY:?SEARXNG_SECRET_KEY must be set}
    entrypoint: ["sh", "/bootstrap/entrypoint.sh"]
    volumes:
      - searxng_config:/etc/searxng
      - ./searxng/settings.yml:/bootstrap/settings.yml:ro
      - ./searxng/entrypoint.sh:/bootstrap/entrypoint.sh:ro
    ports:
      - "8080:8080"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"from urllib.request import urlopen; urlopen('http://127.0.0.1:8080/healthz', timeout=3)\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

volumes:
  postgres_data:
  searxng_config:
